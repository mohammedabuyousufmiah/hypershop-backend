# Hypershop backend — Render Blueprint (FREE-TIER, for testing/demo).
#
# Provisions, at $0/mo:
#   • hypershop-api      — FastAPI web service (Docker)  [free]
#   • hypershop-postgres — managed Postgres 16           [free, expires 30d]
#   • hypershop-redis    — managed Redis ("Key Value")   [free]
#
# Free-tier trade-offs vs the paid setup:
#   - Web service COLD-STARTS after ~15 min idle (first request ~50s).
#   - Free Postgres is deleted after 30 days — fine for a demo.
#   - No background worker (Render has no free workers). ARQ jobs queue but
#     aren't processed; login + browse + checkout-create don't need them.
#   - No pre-deploy hook / Shell on free, so migrations + IAM bootstrap +
#     demo-login seed run on container start via scripts/render_start.sh.
#
# To go production-grade later: bump plans to `starter`/`basic-256mb`,
# re-add a worker service, and switch the api start back to the image CMD
# (the Dockerfile already runs preflight + gunicorn). See git history.

databases:
  - name: hypershop-postgres
    databaseName: hypershop
    user: hypershop
    plan: free
    region: singapore
    postgresMajorVersion: "16"

services:
  - type: keyvalue
    name: hypershop-redis
    plan: free
    region: singapore
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: hypershop-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    # Free tier has no pre-deploy hook — migrate + bootstrap + seed run here,
    # then gunicorn binds Render's $PORT.
    dockerCommand: sh scripts/render_start.sh
    autoDeployTrigger: commit
    envVars:
      - fromGroup: hypershop-shared
      - key: DATABASE_URL
        fromDatabase:
          name: hypershop-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: hypershop-redis
          property: connectionString

envVarGroups:
  - name: hypershop-shared
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_DOMAIN
        value: api.hypershop.com.bd
      - key: API_PREFIX
        value: /api/v1
      # Free instance = 512 MB RAM → a single gunicorn worker.
      - key: WEB_CONCURRENCY
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_SECRET
        generateValue: true
      # ── set these in the Render dashboard (sync:false) ──
      - key: CORS_ORIGINS               # e.g. https://hypershop.com.bd
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      # Demo/staging only: any 6-digit rider OTP is accepted. Never true in
      # a real public production env. See MOBILE_DEMO_LOGINS.md.
      - key: OTP_DEV_BYPASS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_SENDER
        sync: false
