name: backend CI

on:
  push:
    paths: ["app/**", "tests/**", "alembic/**", "pyproject.toml", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["app/**", "tests/**", "alembic/**", "pyproject.toml"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hypershop
          POSTGRES_PASSWORD: hypershop
          POSTGRES_DB: hypershop_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hypershop"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }

      - name: Install
        run: |
          pip install -e ".[dev]" || pip install -r requirements/base.txt
          pip install pytest pytest-asyncio httpx psycopg2-binary

      - name: Run suite (external-mode — service containers, no testcontainers)
        env:
          HYPERSHOP_TEST_DATABASE_URL: postgresql+asyncpg://hypershop:hypershop@localhost:5432/hypershop_test
          HYPERSHOP_TEST_REDIS_URL: redis://localhost:6379/9
        run: python -m pytest tests/ -q --ignore=tests/e2e
