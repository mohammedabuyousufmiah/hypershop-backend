name: hypershop-prod

# TLS overlay — adds Caddy in front of `api` for automatic Let's Encrypt
# certificates. Use ONLY together with docker-compose.prod.yml:
#
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f docker-compose.tls.yml \
#     up -d --build
#
# Required env vars (add to your .env):
#   API_DOMAIN=api.hypershop.example       # the public hostname (DNS A/AAAA → this host)
#   ACME_EMAIL=ops@hypershop.example       # Let's Encrypt account email
#
# Caddy auto-provisions and renews certs via HTTP-01 challenge — port 80
# MUST be reachable from the public internet for that to work.
#
# The base prod compose already binds api to 127.0.0.1:8000 only, so
# Caddy is the only public ingress regardless of host firewall.

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN to the public FQDN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt registration}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - hypershop_caddy_data:/data
      - hypershop_caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - public

volumes:
  hypershop_caddy_data:
    driver: local
  hypershop_caddy_config:
    driver: local
