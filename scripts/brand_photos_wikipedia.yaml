# Curated Wikipedia product hero shots — sourced 2026-05-25.
#
# Strategy: Wikipedia ARTICLE pages (not Commons categories) carry
# clean product hero shots. Categories tend to dump editorial / event
# photography that's useless for catalog.
#
# URLs include /thumb/ prefix — downloader auto-strips to fetch
# original full-resolution. Filenames are normalised to brand_model
# pattern so filename-fuzzy-match can pair them to catalog SKUs.
#
# Run:
#   python -m scripts.download_brand_photos \
#       --manifest scripts/brand_photos_wikipedia.yaml \
#       --dest "C:/staging/photos/"
#
# Then ingest per brand:
#   python -m scripts.ingest_photos \
#       --folder "C:/staging/photos/samsung/" \
#       --brand-slug samsung --match-mode filename --threshold 0.35

defaults:
  dest: "C:/staging/photos"

items:
  # ---- Samsung (Galaxy S24 series) ----
  - brand_slug: samsung
    url: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Samsung_Galaxy_S24%2C_Sperrbildschirm.JPG/250px-Samsung_Galaxy_S24%2C_Sperrbildschirm.JPG"
    filename: "samsung_galaxy_s24_lock_screen.jpg"
