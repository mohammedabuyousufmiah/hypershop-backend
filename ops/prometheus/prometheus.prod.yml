# Production Prometheus scrape config.
#
# Mounted by docker-compose.observability.prod.yml. Differences from
# the dev `prometheus.yml`:
#   - 30s scrape interval (vs 15s) — half the storage cost, fine for a
#     single-host BD pharmacy stack with 100 RPS peak
#   - Adds `external_labels` so future federation / remote_write to a
#     hosted Prometheus (Grafana Cloud, etc.) can disambiguate this
#     deployment from staging / dev
#
# Override retention via PROMETHEUS_RETENTION_DAYS in .env.prod
# (defaulted to 30 days in the compose file).

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: hypershop-prod
    environment: production

scrape_configs:
  - job_name: hypershop-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: hypershop-api

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Host metrics — CPU / RAM / disk / network / filesystem.
  # node_exporter runs in `network_mode: host` so Prometheus reaches it
  # at the container's host gateway (Docker's `host.docker.internal` on
  # macOS/Win, the host bridge IP on Linux). In the observability
  # overlay Prometheus is on the same Docker bridge; we use
  # `host.docker.internal` and add it via `extra_hosts: host-gateway` —
  # see docker-compose.observability.prod.yml.
  - job_name: node_exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: host

  # Per-container metrics — cAdvisor.
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: containers
