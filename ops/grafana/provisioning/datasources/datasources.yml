# Grafana datasource provisioning — Prometheus + Jaeger.
# Auto-loaded on Grafana startup; survives restarts via the
# ``hypershop_grafana`` named volume.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
